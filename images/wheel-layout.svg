<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 510" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="dir-arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#5a8a5a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="540" height="510" rx="12" fill="#2b2b2b"/>

  <!-- Title -->
  <text x="270" y="38" text-anchor="middle" fill="#c0c0c0" font-size="20" font-weight="bold">Wheel Layout (Top-Down View)</text>

  <!-- Center of robot -->
  <!-- cx=270, cy=275, radius=130 -->

  <!-- Robot body circle (dashed) -->
  <circle cx="270" cy="275" r="130" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Center dot -->
  <circle cx="270" cy="275" r="4" fill="#888"/>

  <!-- Radius line: center to Wheel 1 (top, 90 deg) -->
  <line x1="270" y1="275" x2="270" y2="145" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Radius line: center to Wheel 2 (210 deg) -->
  <!-- pos: 270 + 130*cos(210) = 270 - 112.6 = 157.4,  275 - 130*sin(210) = 275 + 65 = 340 -->
  <line x1="270" y1="275" x2="157" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Radius line: center to Wheel 3 (330 deg) -->
  <!-- pos: 270 + 130*cos(330) = 270 + 112.6 = 382.6,  275 - 130*sin(330) = 275 + 65 = 340 -->
  <line x1="270" y1="275" x2="383" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 60mm radius annotation along the top radius line -->
  <text x="305" y="200" fill="#999" font-size="13" font-style="italic" transform="rotate(-75, 305, 200)">60 mm</text>

  <!-- ==================== WHEEL 1 (front, 90 deg, top of circle) ==================== -->
  <!-- Position: (270, 145). Tangent at 90 deg is horizontal => rotation 0 deg -->
  <rect x="232" y="128" width="76" height="32" rx="6" fill="#4a3f6b" stroke="#7b6faf" stroke-width="2"/>
  <text x="270" y="150" text-anchor="middle" fill="#d0c8f0" font-size="14" font-weight="bold">Wheel 1</text>
  <!-- Label above -->
  <rect x="185" y="72" width="170" height="28" rx="5" fill="#3a3355"/>
  <text x="270" y="91" text-anchor="middle" fill="#c4b8f0" font-size="14">M1 / front / 90°</text>

  <!-- ==================== WHEEL 2 (rear-left, 210 deg) ==================== -->
  <!-- Position: (157, 340). Tangent at 210 deg: rotate +60 deg CW in SVG -->
  <rect x="119" y="324" width="76" height="32" rx="6" fill="#4a3f6b" stroke="#7b6faf" stroke-width="2"
        transform="rotate(60, 157, 340)"/>
  <text x="130" y="363" text-anchor="middle" fill="#d0c8f0" font-size="14" font-weight="bold">Wheel 2</text>
  <!-- Label below -->
  <rect x="32" y="395" width="195" height="28" rx="5" fill="#3a3355"/>
  <text x="130" y="414" text-anchor="middle" fill="#c4b8f0" font-size="14">M2 / rear-left / 210°</text>

  <!-- ==================== WHEEL 3 (rear-right, 330 deg) ==================== -->
  <!-- Position: (383, 340). Tangent at 330 deg: rotate -60 deg in SVG -->
  <rect x="345" y="324" width="76" height="32" rx="6" fill="#4a3f6b" stroke="#7b6faf" stroke-width="2"
        transform="rotate(-60, 383, 340)"/>
  <text x="410" y="363" text-anchor="middle" fill="#d0c8f0" font-size="14" font-weight="bold">Wheel 3</text>
  <!-- Label below -->
  <rect x="313" y="395" width="195" height="28" rx="5" fill="#3a3355"/>
  <text x="410" y="414" text-anchor="middle" fill="#c4b8f0" font-size="14">M3 / rear-right / 330°</text>

  <!-- ==================== DIRECTION ARROWS (holonomic motion) ==================== -->
  <!-- Cardinal directions -->
  <line x1="270" y1="275" x2="270" y2="210" stroke="#5a8a5a" stroke-width="1.8" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="270" y2="340" stroke="#5a8a5a" stroke-width="1.8" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="205" y2="275" stroke="#5a8a5a" stroke-width="1.8" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="335" y2="275" stroke="#5a8a5a" stroke-width="1.8" marker-end="url(#dir-arrow)"/>
  <!-- Diagonals -->
  <line x1="270" y1="275" x2="224" y2="229" stroke="#5a8a5a" stroke-width="1.2" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="316" y2="229" stroke="#5a8a5a" stroke-width="1.2" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="224" y2="321" stroke="#5a8a5a" stroke-width="1.2" marker-end="url(#dir-arrow)"/>
  <line x1="270" y1="275" x2="316" y2="321" stroke="#5a8a5a" stroke-width="1.2" marker-end="url(#dir-arrow)"/>

  <!-- ==================== CAPTIONS ==================== -->
  <text x="270" y="462" text-anchor="middle" fill="#888" font-size="14" font-style="italic">Holonomic: moves in any direction without rotating</text>
  <text x="270" y="484" text-anchor="middle" fill="#666" font-size="12">Wheels at 120° intervals, 36 mm diameter</text>
</svg>
